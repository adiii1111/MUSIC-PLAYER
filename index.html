 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andy's Playlist</title>
  <meta name="description" content="A premium web-based multi-player featuring original top tracks.">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="var(--accent)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        <h1>Andy's Playlist</h1>
      </div>
      <nav>
        <ul>
          <li class="active">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            Home
          </li>
          <li>
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            Search
          </li>
          <li>
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8zm0 3h4v2h-4zm0-6h8v2h-8z"/></svg>
            Library
          </li>
        </ul>
      </nav>
      <div class="playlists">
        <h3>Featured Artists</h3>
        <ul id="artist-list">
          <li>Justin Bieber</li>
          <li>Billie Eilish</li>
          <li>sombr</li>
          <li>The Weeknd</li>
          <li>Air Supply</li>
        </ul>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="nav-buttons">
          <button>&lt;</button>
          <button>&gt;</button>
        </div>
        <div class="user-profile">
          <img src="https://ui-avatars.com/api/?name=User&background=random" alt="User" class="avatar">
        </div>
      </header>

      <div class="content-scroll">
        <div class="hero">
          <div class="hero-bg"></div>
          <h2 id="greeting">Good evening</h2>
        </div>

        <section class="tracks-section">
          <div class="section-header">
            <h3>Top Tracks Playlist</h3>
            <button class="play-all-btn" id="btn-play-all">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
          <div class="tracklist-header">
            <span>#</span>
            <span>Title</span>
            <span>Album</span>
            <span><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8z"/><path d="M8 3.25a.75.75 0 01.75.75v3.25H11a.75.75 0 010 1.5H7.25V4A.75.75 0 018 3.25z"/></svg></span>
          </div>
          <div id="tracks-container" class="tracks-container">
            <div class="loading">
              <div class="spinner"></div>
              <span>Loading premium tracks from iTunes API...</span>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer class="playbar">
      <div class="now-playing" id="now-playing-container">
        <img id="np-cover" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Cover" class="hidden">
        <div class="np-info">
          <div id="np-title" class="placeholder-text">No track selected</div>
          <div id="np-artist" class="placeholder-subtext">-</div>
        </div>
      </div>
      
      <div class="player-controls">
        <div class="buttons">
          <button id="btn-prev" class="control-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
          <button id="btn-play" class="control-btn play-btn"><svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
          <button id="btn-next" class="control-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
        <div class="progress-container">
          <span id="time-current">0:00</span>
          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span id="time-total">0:30</span>
        </div>
      </div>
      
      <div class="volume-controls">
        <svg viewBox="0 0 24 24" width="20" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <div class="volume-bar" id="volume-bar">
          <div class="volume-fill" id="volume-fill"></div>
        </div>
      </div>
    </footer>
  </div>
  <audio id="audio-player"></audio>
  <script src="app.js"></script>
</body>
</html>
